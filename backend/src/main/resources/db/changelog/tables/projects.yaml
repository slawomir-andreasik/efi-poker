databaseChangeLog:

  - changeSet:
      id: "projects-001-create"
      author: "sandreasik"
      comment: "Create projects table"
      changes:
        - sql:
            sql: |
              CREATE TABLE projects (
                id         UUID PRIMARY KEY DEFAULT gen_random_uuid(),
                name       VARCHAR(255) NOT NULL,
                slug       VARCHAR(64) NOT NULL UNIQUE,
                admin_code VARCHAR(64) NOT NULL,
                created_by UUID REFERENCES users(id),
                created_at TIMESTAMP NOT NULL DEFAULT now()
              );
              CREATE INDEX idx_projects_slug ON projects(slug);
      rollback:
        - sql:
            sql: |
              DROP INDEX IF EXISTS idx_projects_slug;
              DROP TABLE IF EXISTS projects;

  - changeSet:
      id: "projects-004-add-visibility"
      author: "sandreasik"
      comment: "Public projects discoverable without invite link"
      changes:
        - sql:
            sql: |
              ALTER TABLE projects ADD COLUMN is_public BOOLEAN NOT NULL DEFAULT false;
              CREATE INDEX idx_projects_is_public ON projects(is_public) WHERE is_public = true;
      rollback:
        - sql:
            sql: |
              DROP INDEX IF EXISTS idx_projects_is_public;
              ALTER TABLE projects DROP COLUMN is_public;

  - changeSet:
      id: "projects-005-remove-visibility"
      author: "sandreasik"
      comment: "Remove public projects - all projects are now private"
      changes:
        - sql:
            sql: |
              DROP INDEX IF EXISTS idx_projects_is_public;
              ALTER TABLE projects DROP COLUMN is_public;
      rollback:
        - sql:
            sql: |
              ALTER TABLE projects ADD COLUMN is_public BOOLEAN NOT NULL DEFAULT false;
              CREATE INDEX idx_projects_is_public ON projects(is_public) WHERE is_public = true;

  - changeSet:
      id: "projects-006-fk-indexes"
      author: "sandreasik"
      comment: "Add index on created_by FK for user-scoped project queries"
      changes:
        - sql:
            sql: |
              CREATE INDEX idx_projects_created_by ON projects(created_by);
      rollback:
        - sql:
            sql: "DROP INDEX IF EXISTS idx_projects_created_by;"

  - changeSet:
      id: admin-code-hash-column-resize
      author: "sandreasik"
      logicalFilePath: db/changelog/tables/admin-code-hash.yaml
      comment: "Resize admin_code column for BCrypt hashes"
      changes:
        - modifyDataType:
            tableName: projects
            columnName: admin_code
            newDataType: VARCHAR(128)

  - changeSet:
      id: hash-existing-admin-codes
      author: "sandreasik"
      logicalFilePath: db/changelog/tables/admin-code-hash.yaml
      comment: "One-shot BCrypt hashing of all plaintext admin codes. Non-reversible."
      changes:
        - customChange:
            class: com.andreasik.efipoker.project.AdminCodeHashMigration
