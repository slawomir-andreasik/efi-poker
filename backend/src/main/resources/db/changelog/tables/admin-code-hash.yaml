databaseChangeLog:
  - changeSet:
      id: admin-code-hash-column-resize
      author: security-audit
      changes:
        - modifyDataType:
            tableName: projects
            columnName: admin_code
            newDataType: VARCHAR(128)
  - changeSet:
      id: hash-existing-admin-codes
      author: security-audit
      comment: "One-shot BCrypt hashing of all plaintext admin codes. Non-reversible."
      changes:
        - customChange:
            class: com.andreasik.efipoker.project.AdminCodeHashMigration
