spring:
  lifecycle:
    timeout-per-shutdown-phase: 60s
  jpa:
    show-sql: false
  datasource:
    hikari:
      connection-test-query: "SELECT 1"
      maximum-pool-size: 15
      minimum-idle: 5
      idle-timeout: 300000
      max-lifetime: 1200000
      connection-timeout: 5000
      leak-detection-threshold: 30000

management:
  endpoint:
    health:
      show-details: never
      show-components: never
  server:
    port: 9091
  endpoints:
    web:
      exposure:
        include: health,prometheus,info
  tracing:
    sampling:
      probability: ${TRACING_SAMPLE_RATE:0.1}
  otlp:
    metrics:
      export:
        enabled: false
  opentelemetry:
    tracing:
      export:
        endpoint: ${OTLP_ENDPOINT:http://tempo:4318/v1/traces}

server:
  shutdown: graceful
  tomcat:
    threads:
      max: 50
      min-spare: 10

logging:
  level:
    root: WARN
    com.andreasik.efipoker: INFO
