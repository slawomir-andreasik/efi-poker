services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: efipoker
      POSTGRES_USER: efipoker
      POSTGRES_PASSWORD: changeme
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U efipoker"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
