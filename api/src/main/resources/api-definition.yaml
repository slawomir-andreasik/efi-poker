openapi: 3.0.3
info:
  description: Sprint Planning Poker for Scrum teams
  title: EFI Poker API
  version: 1.0.0
servers:
- description: API base path
  url: /api/v1
tags:
- description: Health check
  name: health
- description: Project management
  name: projects
- description: Estimation rooms
  name: rooms
- description: Tasks within rooms
  name: tasks
- description: Story point estimates
  name: estimates
- description: Project participants
  name: participants
- description: Authentication
  name: auth
- description: Admin user management
  name: admin
- description: Estimation analytics and statistics
  name: analytics
paths:
  /health:
    get:
      description: Returns application health status. No authentication required.
      operationId: healthCheck
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
          description: Application is healthy
      summary: Health check
      tags:
      - health
  /projects:
    post:
      operationId: createProject
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProjectRequest"
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectAdminResponse"
          description: Project created
        "400":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ValidationErrorResponse"
          description: Invalid request
      summary: Create a new project
      tags:
      - projects
  /projects/{slug}:
    delete:
      operationId: deleteProject
      parameters:
      - description: URL-safe project slug
        in: path
        name: slug
        required: true
        schema:
          type: string
      - description: Admin code for project authorization
        in: header
        name: X-Admin-Code
        required: false
        schema:
          type: string
      responses:
        "204":
          description: Project deleted
        "403":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
          description: Access denied
        "404":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
          description: Resource not found
      summary: Delete project and all associated data (admin)
      tags:
      - projects
    get:
      operationId: getProjectBySlug
      parameters:
      - description: URL-safe project slug
        in: path
        name: slug
        required: true
        schema:
          type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectResponse"
          description: Project info
        "404":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
          description: Resource not found
      summary: Get project info
      tags:
      - projects
    patch:
      operationId: updateProject
      parameters:
      - description: URL-safe project slug
        in: path
        name: slug
        required: true
        schema:
          type: string
      - description: Admin code for project authorization
        in: header
        name: X-Admin-Code
        required: false
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProjectRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectAdminResponse"
          description: Updated project
        "400":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ValidationErrorResponse"
          description: Invalid request
        "403":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
          description: Access denied
        "404":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
          description: Resource not found
      summary: Update project (admin)
      tags:
      - projects
  /projects/{slug}/admin:
    get:
      operationId: getProjectAdmin
      parameters:
      - description: URL-safe project slug
        in: path
        name: slug
        required: true
        schema:
          type: string
      - description: Admin code for project authorization
        in: header
        name: X-Admin-Code
        required: false
        schema:
          type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectAdminResponse"
          description: Project admin info
        "403":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
          description: Access denied
        "404":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
          description: Resource not found
      summary: Get project with admin data
      tags:
      - projects
  /projects/{slug}/rooms:
    get:
      operationId: listRooms
      parameters:
      - description: URL-safe project slug
        in: path
        name: slug
        required: true
        schema:
          type: string
      - description: UUID of the current participant
        in: header
        name: X-Participant-Id
        required: false
        schema:
          format: uuid
          type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: "#/components/schemas/RoomResponse"
                type: array
          description: List of rooms
      summary: List rooms for project
      tags:
      - rooms
    post:
      operationId: createRoom
      parameters:
      - description: URL-safe project slug
        in: path
        name: slug
        required: true
        schema:
          type: string
      - description: Admin code for project authorization
        in: header
        name: X-Admin-Code
        required: false
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateRoomRequest"
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RoomResponse"
          description: Room created
        "400":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ValidationErrorResponse"
          description: Invalid request
        "403":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
          description: Access denied
      summary: Create a room
      tags:
      - rooms
  /projects/{slug}/participants:
    get:
      operationId: listProjectParticipants
      parameters:
      - description: URL-safe project slug
        in: path
        name: slug
        required: true
        schema:
          type: string
      - description: Admin code for project authorization
        in: header
        name: X-Admin-Code
        required: false
        schema:
          type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: "#/components/schemas/ParticipantResponse"
                type: array
          description: List of participants
        "403":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
          description: Access denied
        "404":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
          description: Resource not found
      summary: List project participants (admin only)
      tags:
      - participants
    post:
      operationId: joinProject
      parameters:
      - description: URL-safe project slug
        in: path
        name: slug
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/JoinProjectRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ParticipantResponse"
          description: Participant info
        "400":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ValidationErrorResponse"
          description: Invalid request
      summary: Join project (create/get participant by nickname)
      tags:
      - participants
  /projects/{slug}/participants/me:
    get:
      description: Returns the participant record for the authenticated user in the
        given project. Requires JWT authentication.
      operationId: getMyParticipant
      parameters:
      - description: URL-safe project slug
        in: path
        name: slug
        required: true
        schema:
          type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ParticipantResponse"
          description: Participant info
        "404":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
          description: User is not a participant in this project
      security:
      - bearerAuth: []
      summary: Get current user's participant in a project
      tags:
      - participants
  /projects/{slug}/participants/{participantId}:
    delete:
      operationId: deleteParticipant
      parameters:
      - description: URL-safe project slug
        in: path
        name: slug
        required: true
        schema:
          type: string
      - description: UUID of the participant
        in: path
        name: participantId
        required: true
        schema:
          format: uuid
          type: string
      - description: Admin code for project authorization
        in: header
        name: X-Admin-Code
        required: false
        schema:
          type: string
      responses:
        "204":
          description: Participant deleted
        "403":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
          description: Access denied
        "404":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
          description: Participant not found
      summary: Delete participant (admin only)
      tags:
      - participants
    get:
      operationId: getParticipant
      parameters:
      - description: URL-safe project slug
        in: path
        name: slug
        required: true
        schema:
          type: string
      - description: UUID of the participant
        in: path
        name: participantId
        required: true
        schema:
          format: uuid
          type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ParticipantResponse"
          description: Participant info
        "404":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
          description: Participant not found
      summary: Get participant by ID (magic link validation)
      tags:
      - participants
    patch:
      operationId: updateParticipant
      parameters:
      - description: URL-safe project slug
        in: path
        name: slug
        required: true
        schema:
          type: string
      - description: UUID of the participant
        in: path
        name: participantId
        required: true
        schema:
          format: uuid
          type: string
      - description: UUID of the current participant
        in: header
        name: X-Participant-Id
        required: false
        schema:
          format: uuid
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateParticipantRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ParticipantResponse"
          description: Updated participant
        "400":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ValidationErrorResponse"
          description: Invalid request
        "403":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
          description: Not allowed to update this participant
        "404":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
          description: Participant not found
        "409":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
          description: Nickname already taken in this project
      summary: Update participant nickname (self-service)
      tags:
      - participants
  /rooms/by-slug/{roomSlug}:
    get:
      operationId: getRoomBySlug
      parameters:
      - description: Human-readable room slug (e.g. A3X-K7B)
        in: path
        name: roomSlug
        required: true
        schema:
          pattern: "^[A-Z0-9]{3}-[A-Z0-9]{3}$"
          type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RoomSlugResponse"
          description: Room lookup result
        "404":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
          description: Room not found
      summary: Look up room by slug code
      tags:
      - rooms
  /rooms/{roomId}:
    delete:
      operationId: deleteRoom
      parameters:
      - description: UUID of the room
        in: path
        name: roomId
        required: true
        schema:
          format: uuid
          type: string
      - description: Admin code for project authorization
        in: header
        name: X-Admin-Code
        required: false
        schema:
          type: string
      responses:
        "204":
          description: Room deleted
        "403":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
          description: Access denied
        "404":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
          description: Resource not found
      summary: Delete room and all associated data (admin)
      tags:
      - rooms
    get:
      operationId: getRoom
      parameters:
      - description: UUID of the room
        in: path
        name: roomId
        required: true
        schema:
          format: uuid
          type: string
      - description: UUID of the current participant
        in: header
        name: X-Participant-Id
        required: false
        schema:
          format: uuid
          type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RoomDetailResponse"
          description: Room details
        "404":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
          description: Resource not found
      summary: Get room with tasks and own estimates
      tags:
      - rooms
    patch:
      operationId: updateRoom
      parameters:
      - description: UUID of the room
        in: path
        name: roomId
        required: true
        schema:
          format: uuid
          type: string
      - description: Admin code for project authorization
        in: header
        name: X-Admin-Code
        required: false
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateRoomRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RoomResponse"
          description: Updated room
        "400":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ValidationErrorResponse"
          description: Invalid request
        "403":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
          description: Access denied
        "404":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
          description: Resource not found
      summary: Update room
      tags:
      - rooms
  /rooms/{roomId}/admin:
    get:
      operationId: getRoomAdmin
      parameters:
      - description: UUID of the room
        in: path
        name: roomId
        required: true
        schema:
          format: uuid
          type: string
      - description: Admin code for project authorization
        in: header
        name: X-Admin-Code
        required: false
        schema:
          type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RoomAdminResponse"
          description: Room admin view
        "403":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
          description: Access denied
        "404":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
          description: Resource not found
      summary: Get room with ALL estimates (admin)
      tags:
      - rooms
  /rooms/{roomId}/reveal:
    post:
      operationId: revealEstimates
      parameters:
      - description: UUID of the room
        in: path
        name: roomId
        required: true
        schema:
          format: uuid
          type: string
      - description: Admin code for project authorization
        in: header
        name: X-Admin-Code
        required: false
        schema:
          type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RoomDetailResponse"
          description: Estimates revealed
        "403":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
          description: Access denied
        "404":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
          description: Resource not found
      summary: Force reveal all estimates
      tags:
      - rooms
  /rooms/{roomId}/reopen:
    post:
      operationId: reopenRoom
      parameters:
      - description: UUID of the room
        in: path
        name: roomId
        required: true
        schema:
          format: uuid
          type: string
      - description: Admin code for project authorization
        in: header
        name: X-Admin-Code
        required: false
        schema:
          type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RoomDetailResponse"
          description: Room reopened
        "403":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
          description: Access denied
        "404":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
          description: Resource not found
      summary: Reopen a revealed or closed room
      tags:
      - rooms
  /rooms/{roomId}/progress:
    get:
      operationId: getRoomProgress
      parameters:
      - description: UUID of the room
        in: path
        name: roomId
        required: true
        schema:
          format: uuid
          type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RoomProgressResponse"
          description: Progress info
        "404":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
          description: Resource not found
      summary: Get voting progress (X/Y per task)
      tags:
      - rooms
  /rooms/{roomId}/participant-progress:
    get:
      operationId: getParticipantProgress
      parameters:
      - description: UUID of the room
        in: path
        name: roomId
        required: true
        schema:
          format: uuid
          type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ParticipantProgressResponse"
          description: Participant progress
        "404":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
          description: Resource not found
      summary: Get per-participant voting progress
      tags:
      - rooms
  /rooms/{roomId}/results:
    get:
      operationId: getRoomResults
      parameters:
      - description: UUID of the room
        in: path
        name: roomId
        required: true
        schema:
          format: uuid
          type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RoomResultsResponse"
          description: Full results
        "403":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
          description: Not yet revealed
        "404":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
          description: Resource not found
      summary: Get full results (only if REVEALED/CLOSED)
      tags:
      - rooms
  /rooms/{roomId}/results/export:
    get:
      operationId: exportResults
      parameters:
      - description: UUID of the room
        in: path
        name: roomId
        required: true
        schema:
          format: uuid
          type: string
      - description: Admin code for project authorization
        in: header
        name: X-Admin-Code
        required: false
        schema:
          type: string
      responses:
        "200":
          content:
            text/csv:
              schema:
                type: string
          description: CSV export
        "404":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
          description: Resource not found
      summary: Export results as CSV
      tags:
      - rooms
  /rooms/{roomId}/tasks:
    post:
      operationId: createTask
      parameters:
      - description: UUID of the room
        in: path
        name: roomId
        required: true
        schema:
          format: uuid
          type: string
      - description: Admin code for project authorization
        in: header
        name: X-Admin-Code
        required: false
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTaskRequest"
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskResponse"
          description: Task created
        "400":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ValidationErrorResponse"
          description: Invalid request
        "403":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
          description: Access denied
      summary: Create a task
      tags:
      - tasks
  /rooms/{roomId}/tasks/import:
    post:
      operationId: importTasks
      parameters:
      - description: UUID of the room
        in: path
        name: roomId
        required: true
        schema:
          format: uuid
          type: string
      - description: Admin code for project authorization
        in: header
        name: X-Admin-Code
        required: false
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ImportTasksRequest"
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                items:
                  $ref: "#/components/schemas/TaskResponse"
                type: array
          description: Tasks imported
        "400":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ValidationErrorResponse"
          description: Invalid request
      summary: Bulk import tasks
      tags:
      - tasks
  /rooms/{roomId}/live:
    get:
      operationId: getLiveRoomState
      parameters:
      - description: UUID of the room
        in: path
        name: roomId
        required: true
        schema:
          format: uuid
          type: string
      - description: UUID of the current participant
        in: header
        name: X-Participant-Id
        required: false
        schema:
          format: uuid
          type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LiveRoomStateResponse"
          description: Live room state
        "404":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
          description: Room not found
        "409":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
          description: Room is not LIVE type
      summary: Get live room state with participant vote statuses
      tags:
      - rooms
  /rooms/{roomId}/new-round:
    post:
      operationId: newRound
      parameters:
      - description: UUID of the room
        in: path
        name: roomId
        required: true
        schema:
          format: uuid
          type: string
      - description: Admin code for project authorization
        in: header
        name: X-Admin-Code
        required: false
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NewRoundRequest"
        required: false
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LiveRoomStateResponse"
          description: New round started
        "400":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ValidationErrorResponse"
          description: Invalid request
        "403":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
          description: Access denied
        "404":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
          description: Resource not found
        "409":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
          description: Room is not LIVE type
      summary: "Start a new round in a Live room (clears estimates, reopens)"
      tags:
      - rooms
  /rooms/{roomId}/history:
    get:
      description: Returns all completed (revealed) rounds with results. Only available
        for LIVE rooms.
      operationId: getRoundHistory
      parameters:
