components:
  parameters:
    SlugPath:
      description: URL-safe project slug
      in: path
      name: slug
      required: true
      schema:
        type: string
    AdminCodeHeader:
      description: Admin code for project authorization
      in: header
      name: X-Admin-Code
      required: false
      schema:
        type: string
    ParticipantIdHeader:
      description: UUID of the current participant
      in: header
      name: X-Participant-Id
      required: false
      schema:
        format: uuid
        type: string
    ParticipantIdPath:
      description: UUID of the participant
      in: path
      name: participantId
      required: true
      schema:
        format: uuid
        type: string
    RoomSlugPath:
      description: Human-readable room slug (e.g. A3X-K7B)
      in: path
      name: roomSlug
      required: true
      schema:
        pattern: "^[A-Z0-9]{3}-[A-Z0-9]{3}$"
        type: string
    RoomIdPath:
      description: UUID of the room
      in: path
      name: roomId
      required: true
      schema:
        format: uuid
        type: string
    TaskIdPath:
      description: UUID of the task
      in: path
      name: taskId
      required: true
      schema:
        format: uuid
        type: string
    UserIdPath:
      description: UUID of the user
      in: path
      name: id
      required: true
      schema:
        format: uuid
        type: string
  schemas:
    HealthResponse:
      example:
        version: 0.1.12
        status: UP
      properties:
        status:
          example: UP
          type: string
        version:
          example: 0.1.12
          type: string
      required:
      - status
      - version
      type: object
    CreateProjectRequest:
      example:
        name: name
      properties:
        name:
          maxLength: 255
          minLength: 1
          pattern: "^(?!.*<[a-zA-Z/]).*$"
          type: string
      required:
      - name
      type: object
    ProjectAdminResponse:
      example:
        createdAt: 2000-01-23T04:56:07.000+00:00
        name: name
        adminCode: adminCode
        id: 046b6c7f-0b8a-43b9-b35d-6489e6daee91
        slug: slug
      properties:
        id:
          format: uuid
          type: string
        name:
          type: string
        slug:
          type: string
        adminCode:
          type: string
        createdAt:
          format: date-time
          type: string
      required:
      - adminCode
      - createdAt
      - id
      - name
      - slug
      type: object
    ValidationErrorResponse:
      allOf:
      - $ref: "#/components/schemas/ProblemDetail"
      - properties:
          violations:
            items:
              $ref: "#/components/schemas/ValidationErrorResponse_allOf_violations"
            type: array
        required:
        - violations
        type: object
    ProjectResponse:
      example:
        createdAt: 2000-01-23T04:56:07.000+00:00
        name: name
        id: 046b6c7f-0b8a-43b9-b35d-6489e6daee91
        slug: slug
      properties:
        id:
          format: uuid
          type: string
        name:
          type: string
        slug:
          type: string
        createdAt:
          format: date-time
          type: string
      required:
      - createdAt
      - id
      - name
      - slug
      type: object
    ProblemDetail:
      properties:
        type:
          type: string
        title:
          type: string
        status:
          type: integer
        detail:
          type: string
        instance:
          type: string
        traceId:
          description: OpenTelemetry trace ID for log correlation
          type: string
      type: object
    UpdateProjectRequest:
      example:
        name: name
      properties:
        name:
          maxLength: 255
          minLength: 1
          pattern: "^(?!.*<[a-zA-Z/]).*$"
          type: string
      type: object
    RoomResponse:
      allOf:
      - $ref: "#/components/schemas/RoomBase"
      - properties:
          projectId:
            format: uuid
            type: string
          createdAt:
            format: date-time
            type: string
        required:
        - createdAt
        - projectId
        type: object
      example:
        description: description
        commentTemplate: commentTemplate
        title: title
        createdAt: 2000-01-23T04:56:07.000+00:00
        roundNumber: 0
        autoRevealOnDeadline: true
        commentRequired: true
        topic: topic
        id: 046b6c7f-0b8a-43b9-b35d-6489e6daee91
        deadline: 2000-01-23T04:56:07.000+00:00
        projectId: 046b6c7f-0b8a-43b9-b35d-6489e6daee91
        slug: slug
        roomType: ASYNC
        status: OPEN
    CreateRoomRequest:
      example:
        autoRevealOnDeadline: true
        commentRequired: false
        description: description
        commentTemplate: commentTemplate
        title: title
        deadline: 2000-01-23T04:56:07.000+00:00
        roomType: ASYNC
      properties:
        title:
          maxLength: 255
          minLength: 1
          pattern: "^(?!.*<[a-zA-Z/]).*$"
          type: string
        description:
          maxLength: 2000
          pattern: "^(?![\\s\\S]*<[a-zA-Z/])[\\s\\S]*$"
          type: string
        roomType:
          $ref: "#/components/schemas/RoomType"
        deadline:
          format: date-time
          type: string
        autoRevealOnDeadline:
          default: true
          type: boolean
        commentTemplate:
          maxLength: 2000
          pattern: "^(?![\\s\\S]*<[a-zA-Z/])[\\s\\S]*$"
