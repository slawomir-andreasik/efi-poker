post:
  operationId: refreshGuestToken
  tags: [auth]
  summary: Refresh a guest JWT token
  security:
    - bearerAuth: []
  responses:
    '200':
      description: Refreshed token
      content:
        application/json:
          schema:
            $ref: '../../schemas/response/GuestTokenResponse.yaml'
    '401':
      description: Invalid or expired token
      content:
        application/problem+json:
          schema:
            $ref: '../../schemas/common/error/ProblemDetail.yaml'
    '404':
      description: Participant no longer exists
      content:
        application/problem+json:
          schema:
            $ref: '../../schemas/common/error/ProblemDetail.yaml'
