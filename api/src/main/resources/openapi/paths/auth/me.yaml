get:
  operationId: getCurrentUser
  tags: [auth]
  summary: Get current authenticated user
  security:
    - bearerAuth: []
  responses:
    '200':
      description: User profile
      content:
        application/json:
          schema:
            $ref: '../../schemas/response/UserResponse.yaml'
    '401':
      description: Authentication required
      content:
        application/problem+json:
          schema:
            $ref: '../../schemas/common/error/ProblemDetail.yaml'
