put:
  operationId: changePassword
  tags: [auth]
  summary: Change or set password for current user
  description: >
    Authenticated users can change their password (requires currentPassword)
    or Auth0 users can set a local password for the first time (omit currentPassword).
  security:
    - bearerAuth: []
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: '../../schemas/request/ChangePasswordRequest.yaml'
  responses:
    '204':
      description: Password changed
    '400':
      description: Validation error
      content:
        application/problem+json:
          schema:
            $ref: '../../schemas/common/error/ProblemDetail.yaml'
    '401':
      description: Authentication required
      content:
        application/problem+json:
          schema:
            $ref: '../../schemas/common/error/ProblemDetail.yaml'
    '403':
      description: Current password is incorrect
      content:
        application/problem+json:
          schema:
            $ref: '../../schemas/common/error/ProblemDetail.yaml'
