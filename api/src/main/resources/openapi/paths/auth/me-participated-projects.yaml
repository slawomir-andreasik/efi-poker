get:
  operationId: getMyParticipatedProjects
  tags: [projects]
  summary: Get projects where current user is a participant
  description: Returns projects the authenticated user has joined as a participant.
  security:
    - bearerAuth: []
  responses:
    '200':
      description: List of participated projects
      content:
        application/json:
          schema:
            type: array
            items:
              $ref: '../../schemas/response/ProjectResponse.yaml'
    '401':
      description: Authentication required
      content:
        application/problem+json:
          schema:
            $ref: '../../schemas/common/error/ProblemDetail.yaml'
