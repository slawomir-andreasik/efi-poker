post:
  operationId: submitEstimate
  tags: [estimates]
  summary: Submit or update estimate
  security:
    - bearerAuth: []
  parameters:
    - $ref: '../../parameters/TaskIdPath.yaml'
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: '../../schemas/request/SubmitEstimateRequest.yaml'
  responses:
    '200':
      description: Estimate submitted
      content:
        application/json:
          schema:
            $ref: '../../schemas/response/EstimateResponse.yaml'
    '400':
      description: Invalid request
      content:
        application/problem+json:
          schema:
            $ref: '../../schemas/common/error/ValidationErrorResponse.yaml'

delete:
  operationId: deleteEstimate
  tags: [estimates]
  summary: Remove estimate (unvote)
  security:
    - bearerAuth: []
  parameters:
    - $ref: '../../parameters/TaskIdPath.yaml'
  responses:
    '204':
      description: Estimate removed
    '404':
      description: Resource not found
      content:
        application/problem+json:
          schema:
            $ref: '../../schemas/common/error/ProblemDetail.yaml'
