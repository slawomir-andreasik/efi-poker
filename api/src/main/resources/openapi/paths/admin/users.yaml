get:
  operationId: listUsers
  tags: [admin]
  summary: List all users
  description: Returns a paginated list of all users. Requires ADMIN role.
  security:
    - bearerAuth: []
  parameters:
    - name: page
      in: query
      description: Page number (0-based)
      required: false
      schema:
        type: integer
        default: 0
    - name: size
      in: query
      description: Page size
      required: false
      schema:
        type: integer
        default: 20
        maximum: 100
    - name: search
      in: query
      description: Search by username or email
      required: false
      schema:
        type: string
  responses:
    '200':
      description: List of users
      content:
        application/json:
          schema:
            $ref: '../../schemas/response/PagedUsersResponse.yaml'

post:
  operationId: createUser
  tags: [admin]
  summary: Create a new user
  description: Admin creates a new local user account. Requires ADMIN role.
  security:
    - bearerAuth: []
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: '../../schemas/request/AdminCreateUserRequest.yaml'
  responses:
    '201':
      description: User created
      content:
        application/json:
          schema:
            $ref: '../../schemas/response/AdminUserResponse.yaml'
    '409':
      description: Username already taken
      content:
        application/problem+json:
          schema:
            $ref: '../../schemas/common/error/ProblemDetail.yaml'
