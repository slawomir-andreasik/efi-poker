put:
  operationId: adminResetPassword
  tags: [admin]
  summary: Reset user password
  description: Admin can reset any user's password. Requires ADMIN role.
  security:
    - bearerAuth: []
  parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: '../../schemas/request/AdminResetPasswordRequest.yaml'
  responses:
    '204':
      description: Password reset
    '404':
      description: User not found
      content:
        application/problem+json:
          schema:
            $ref: '../../schemas/common/error/ProblemDetail.yaml'
