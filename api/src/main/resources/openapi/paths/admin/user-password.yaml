put:
  operationId: adminResetPassword
  tags: [admin]
  summary: Reset user password
  description: Admin can reset any user's password. Requires ADMIN role.
  security:
    - bearerAuth: []
  parameters:
    - $ref: '../../parameters/UserIdPath.yaml'
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: '../../schemas/request/AdminResetPasswordRequest.yaml'
  responses:
    '204':
      description: Password reset
    '400':
      description: Invalid request
      content:
        application/problem+json:
          schema:
            $ref: '../../schemas/common/error/ValidationErrorResponse.yaml'
    '401':
      description: Authentication required
      content:
        application/problem+json:
          schema:
            $ref: '../../schemas/common/error/ProblemDetail.yaml'
    '404':
      description: User not found
      content:
        application/problem+json:
          schema:
            $ref: '../../schemas/common/error/ProblemDetail.yaml'
