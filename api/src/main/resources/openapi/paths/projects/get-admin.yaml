get:
  operationId: getProjectAdmin
  tags: [projects]
  summary: Get project with admin data
  security:
    - bearerAuth: []
  parameters:
    - $ref: '../../parameters/SlugPath.yaml'
  responses:
    '200':
      description: Project admin info
      content:
        application/json:
          schema:
            $ref: '../../schemas/response/ProjectAdminResponse.yaml'
    '403':
      description: Access denied
      content:
        application/problem+json:
          schema:
            $ref: '../../schemas/common/error/ProblemDetail.yaml'
    '404':
      description: Resource not found
      content:
        application/problem+json:
          schema:
            $ref: '../../schemas/common/error/ProblemDetail.yaml'
