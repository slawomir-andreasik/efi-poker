get:
  operationId: getRoomAnalytics
  tags: [analytics]
  summary: Get analytics for a revealed/closed room
  security:
    - bearerAuth: []
  parameters:
    - $ref: '../../parameters/RoomIdPath.yaml'
  responses:
    '200':
      description: Room analytics
      content:
        application/json:
          schema:
            $ref: '../../schemas/response/RoomAnalyticsResponse.yaml'
    '403':
      description: Room not yet revealed
      content:
        application/problem+json:
          schema:
            $ref: '../../schemas/common/error/ProblemDetail.yaml'
    '404':
      description: Resource not found
      content:
        application/problem+json:
          schema:
            $ref: '../../schemas/common/error/ProblemDetail.yaml'
