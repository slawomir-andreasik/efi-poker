put:
  operationId: setFinalEstimate
  tags: [tasks]
  summary: Set or update the final agreed story points for a task
  parameters:
    - $ref: '../../parameters/TaskIdPath.yaml'
    - $ref: '../../parameters/AdminCodeHeader.yaml'
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: '../../schemas/request/SetFinalEstimateRequest.yaml'
  responses:
    '200':
      description: Final estimate set
      content:
        application/json:
          schema:
            $ref: '../../schemas/response/TaskResponse.yaml'
    '400':
      description: Invalid request
      content:
        application/problem+json:
          schema:
            $ref: '../../schemas/common/error/ValidationErrorResponse.yaml'
    '404':
      description: Resource not found
      content:
        application/problem+json:
          schema:
            $ref: '../../schemas/common/error/ProblemDetail.yaml'
