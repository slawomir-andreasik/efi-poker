get:
  operationId: getParticipantProgress
  tags: [rooms]
  summary: Get per-participant voting progress
  parameters:
    - $ref: '../../parameters/RoomIdPath.yaml'
  responses:
    '200':
      description: Participant progress
      content:
        application/json:
          schema:
            $ref: '../../schemas/response/ParticipantProgressResponse.yaml'
    '404':
      description: Resource not found
      content:
        application/problem+json:
          schema:
            $ref: '../../schemas/common/error/ProblemDetail.yaml'
