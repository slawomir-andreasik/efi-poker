get:
  operationId: getRoom
  tags: [rooms]
  summary: Get room with tasks and own estimates
  parameters:
    - $ref: '../../parameters/RoomIdPath.yaml'
  responses:
    '200':
      description: Room details
      content:
        application/json:
          schema:
            $ref: '../../schemas/response/RoomDetailResponse.yaml'
    '404':
      description: Resource not found
      content:
        application/problem+json:
          schema:
            $ref: '../../schemas/common/error/ProblemDetail.yaml'
patch:
  operationId: updateRoom
  tags: [rooms]
  summary: Update room
  security:
    - bearerAuth: []
  parameters:
    - $ref: '../../parameters/RoomIdPath.yaml'
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: '../../schemas/request/UpdateRoomRequest.yaml'
  responses:
    '200':
      description: Updated room
      content:
        application/json:
          schema:
            $ref: '../../schemas/response/RoomResponse.yaml'
    '400':
      description: Invalid request
      content:
        application/problem+json:
          schema:
            $ref: '../../schemas/common/error/ValidationErrorResponse.yaml'
    '403':
      description: Access denied
      content:
        application/problem+json:
          schema:
            $ref: '../../schemas/common/error/ProblemDetail.yaml'
    '404':
      description: Resource not found
      content:
        application/problem+json:
          schema:
            $ref: '../../schemas/common/error/ProblemDetail.yaml'
delete:
  operationId: deleteRoom
  tags: [rooms]
  summary: Delete room and all associated data (admin)
  security:
    - bearerAuth: []
  parameters:
    - $ref: '../../parameters/RoomIdPath.yaml'
  responses:
    '204':
      description: Room deleted
    '403':
      description: Access denied
      content:
        application/problem+json:
          schema:
            $ref: '../../schemas/common/error/ProblemDetail.yaml'
    '404':
      description: Resource not found
      content:
        application/problem+json:
          schema:
            $ref: '../../schemas/common/error/ProblemDetail.yaml'
