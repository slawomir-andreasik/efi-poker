get:
  operationId: getRoomResults
  tags: [rooms]
  summary: Get full results (only if REVEALED/CLOSED)
  parameters:
    - $ref: '../../parameters/RoomIdPath.yaml'
  responses:
    '200':
      description: Full results
      content:
        application/json:
          schema:
            $ref: '../../schemas/response/RoomResultsResponse.yaml'
    '403':
      description: Not yet revealed
      content:
        application/problem+json:
          schema:
            $ref: '../../schemas/common/error/ProblemDetail.yaml'
    '404':
      description: Resource not found
      content:
        application/problem+json:
          schema:
            $ref: '../../schemas/common/error/ProblemDetail.yaml'
