get:
  operationId: exportResults
  tags: [rooms]
  summary: Export results as CSV
  security:
    - bearerAuth: []
  parameters:
    - $ref: '../../parameters/RoomIdPath.yaml'
  responses:
    '200':
      description: CSV export
      content:
        text/csv:
          schema:
            type: string
    '404':
      description: Resource not found
      content:
        application/problem+json:
          schema:
            $ref: '../../schemas/common/error/ProblemDetail.yaml'
