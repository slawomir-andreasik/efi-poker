post:
  operationId: revealEstimates
  tags: [rooms]
  summary: Force reveal all estimates
  security:
    - bearerAuth: []
  parameters:
    - $ref: '../../parameters/RoomIdPath.yaml'
  responses:
    '200':
      description: Estimates revealed
      content:
        application/json:
          schema:
            $ref: '../../schemas/response/RoomDetailResponse.yaml'
    '403':
      description: Access denied
      content:
        application/problem+json:
          schema:
            $ref: '../../schemas/common/error/ProblemDetail.yaml'
    '404':
      description: Resource not found
      content:
        application/problem+json:
          schema:
            $ref: '../../schemas/common/error/ProblemDetail.yaml'
