type: object
required: [username, password]
properties:
  username:
    type: string
    minLength: 3
    maxLength: 100
    description: Unique username for the new account
  password:
    type: string
    minLength: 8
    maxLength: 128
    description: Password (8-128 characters)
  email:
    type: string
    format: email
    maxLength: 254
    description: Optional email address
