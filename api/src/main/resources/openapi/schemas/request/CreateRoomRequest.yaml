type: object
required: [title, roomType]
properties:
  title:
    type: string
    minLength: 1
    maxLength: 255
    pattern: '^(?!.*<[a-zA-Z/]).*$'
  description:
    type: string
    maxLength: 2000
    pattern: '^(?![\s\S]*<[a-zA-Z/])[\s\S]*$'
  roomType:
    $ref: '../enums/RoomType.yaml'
  deadline:
    type: string
    format: date-time
  autoRevealOnDeadline:
    type: boolean
    default: true
  commentTemplate:
    type: string
    maxLength: 2000
    pattern: '^(?![\s\S]*<[a-zA-Z/])[\s\S]*$'
  commentRequired:
    type: boolean
    default: false
