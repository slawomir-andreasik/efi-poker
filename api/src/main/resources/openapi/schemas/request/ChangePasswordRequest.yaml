type: object
required: [newPassword]
properties:
  currentPassword:
    type: string
    minLength: 8
    maxLength: 128
    description: Required when user already has a password. Omit when Auth0 user sets password for the first time.
  newPassword:
    type: string
    minLength: 8
    maxLength: 128
    pattern: '^(?=.*[a-z])(?=.*[A-Z])(?=.*\d).{8,}$'
