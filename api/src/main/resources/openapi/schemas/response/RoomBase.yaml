type: object
required:
  - id
  - slug
  - title
  - roomType
  - status
  - roundNumber
  - autoRevealOnDeadline
  - commentRequired
properties:
  id:
    type: string
    format: uuid
  slug:
    type: string
    description: Human-readable room code (e.g. A3X-K7B)
  title:
    type: string
  description:
    type: string
    nullable: true
  roomType:
    $ref: '../enums/RoomType.yaml'
  deadline:
    type: string
    format: date-time
    nullable: true
  status:
    $ref: '../enums/RoomStatus.yaml'
  topic:
    type: string
    nullable: true
  roundNumber:
    type: integer
  autoRevealOnDeadline:
    type: boolean
  commentTemplate:
    type: string
    nullable: true
  commentRequired:
    type: boolean
