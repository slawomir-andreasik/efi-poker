type: object
required:
  - id
  - username
  - email
  - role
  - hasPassword
  - authProvider
properties:
  id:
    type: string
    format: uuid
  username:
    type: string
  email:
    type: string
  role:
    $ref: '../enums/UserRole.yaml'
  hasPassword:
    type: boolean
    description: Whether the user has a local password set
  authProvider:
    $ref: '../enums/AuthProvider.yaml'
