type: object
properties:
  id:
    type: string
    format: uuid
  username:
    type: string
  email:
    type: string
  role:
    type: string
    enum: [ADMIN, USER]
  hasPassword:
    type: boolean
    description: Whether the user has a local password set
  authProvider:
    type: string
    description: Authentication provider (LOCAL or AUTH0)
