type: object
required:
  - participantId
  - nickname
  - votedCount
  - totalTasks
properties:
  participantId:
    type: string
    format: uuid
  nickname:
    type: string
  votedCount:
    type: integer
  totalTasks:
    type: integer
  hasCommentedAll:
    type: boolean
    description: true if participant left comment on every voted task
