type: object
required:
  - auth0Enabled
  - registrationEnabled
  - ldapEnabled
properties:
  auth0Enabled:
    type: boolean
    description: Whether Auth0 OAuth2 login is enabled on this server
  registrationEnabled:
    type: boolean
    description: Whether public user registration is enabled on this server
  ldapEnabled:
    type: boolean
    description: Whether LDAP authentication is enabled on this server
