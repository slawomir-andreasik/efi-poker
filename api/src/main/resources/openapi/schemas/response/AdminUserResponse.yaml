type: object
required:
  - id
  - username
  - email
  - role
  - authProvider
  - createdAt
properties:
  id:
    type: string
    format: uuid
  username:
    type: string
  email:
    type: string
  role:
    $ref: '../enums/UserRole.yaml'
  authProvider:
    $ref: '../enums/AuthProvider.yaml'
  createdAt:
    type: string
    format: date-time
  lastLoginAt:
    type: string
    format: date-time
