type: object
required:
  - taskId
  - title
  - spread
  - voteDistribution
properties:
  taskId:
    type: string
    format: uuid
  title:
    type: string
  averagePoints:
    type: number
    format: double
    nullable: true
  medianPoints:
    type: number
    format: double
    nullable: true
  finalEstimate:
    $ref: '../enums/StoryPoints.yaml'
    nullable: true
  spread:
    type: number
    format: double
    description: Standard deviation of numeric votes
  voteDistribution:
    type: object
    additionalProperties:
      type: integer
    description: Map of story point value to vote count
