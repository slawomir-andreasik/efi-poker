type: object
required:
  - roomId
  - slug
  - status
  - totalParticipants
  - tasks
properties:
  roomId:
    type: string
    format: uuid
  slug:
    type: string
    description: Human-readable room code (e.g. A3X-K7B)
  status:
    $ref: '../enums/RoomStatus.yaml'
  totalParticipants:
    type: integer
  tasks:
    type: array
    items:
      $ref: './TaskProgressResponse.yaml'
