type: object
required:
  - roundNumber
  - voteCount
  - votes
properties:
  roundNumber:
    type: integer
  topic:
    type: string
    nullable: true
  averagePoints:
    type: number
    format: double
    nullable: true
  medianPoints:
    type: number
    format: double
    nullable: true
  voteCount:
    type: integer
  votes:
    type: array
    items:
      $ref: './RoundHistoryVote.yaml'
  completedAt:
    type: string
    format: date-time
