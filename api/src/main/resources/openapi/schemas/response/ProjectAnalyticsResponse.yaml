type: object
required:
  - projectId
  - projectName
  - slug
  - summary
  - roomStats
  - topContentiousTasks
  - participantLeaderboard
properties:
  projectId:
    type: string
    format: uuid
  projectName:
    type: string
  slug:
    type: string
  summary:
    $ref: './ProjectAnalyticsSummary.yaml'
  roomStats:
    type: array
    items:
      $ref: './RoomStatsEntry.yaml'
  topContentiousTasks:
    type: array
    items:
      $ref: './ContentiousTaskEntry.yaml'
  participantLeaderboard:
    type: array
    items:
      $ref: './ParticipantLeaderboardEntry.yaml'
