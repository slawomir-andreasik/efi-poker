type: object
required:
  - taskId
  - title
  - estimates
properties:
  taskId:
    type: string
    format: uuid
  title:
    type: string
  estimates:
    type: array
    items:
      $ref: './EstimateResponse.yaml'
  averagePoints:
    type: number
    format: double
    nullable: true
  medianPoints:
    type: number
    format: double
    nullable: true
  finalEstimate:
    $ref: '../enums/StoryPoints.yaml'
    nullable: true
