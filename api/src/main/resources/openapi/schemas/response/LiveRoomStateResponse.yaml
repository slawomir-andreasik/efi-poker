type: object
required:
  - roomId
  - slug
  - title
  - status
  - roundNumber
  - taskId
  - questionVotesCount
  - participants
properties:
  roomId:
    type: string
    format: uuid
  slug:
    type: string
    description: Human-readable room code (e.g. A3X-K7B)
  title:
    type: string
  topic:
    type: string
    nullable: true
  status:
    $ref: '../enums/RoomStatus.yaml'
  roundNumber:
    type: integer
  commentTemplate:
    type: string
    nullable: true
  commentRequired:
    type: boolean
  questionVotesCount:
    type: integer
  taskId:
    type: string
    format: uuid
    description: Phantom task ID for submitting estimates
  myEstimate:
    $ref: './EstimateResponse.yaml'
    nullable: true
  participants:
    type: array
    items:
      $ref: './LiveParticipantStatus.yaml'
  results:
    $ref: './LiveRoomResults.yaml'
    nullable: true
