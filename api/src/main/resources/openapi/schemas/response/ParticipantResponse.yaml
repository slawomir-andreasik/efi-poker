type: object
required:
  - id
  - nickname
  - createdAt
properties:
  id:
    type: string
    format: uuid
  nickname:
    type: string
  invitedRoomIds:
    type: array
    items:
      type: string
      format: uuid
    description: Rooms this participant can access. Empty array means project-wide access.
  token:
    type: string
    nullable: true
    minLength: 1
    description: Guest JWT token for this participant (only returned for guest joins)
  tokenExpiresAt:
    type: string
    format: date-time
    nullable: true
    description: Token expiration timestamp
  createdAt:
    type: string
    format: date-time
