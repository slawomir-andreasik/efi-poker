allOf:
  - $ref: './TaskBase.yaml'
  - $ref: './EstimateStats.yaml'
  - type: object
    required:
      - allEstimates
      - votedCount
      - questionVotesCount
      - totalParticipants
    properties:
      myEstimate:
        $ref: './EstimateResponse.yaml'
      allEstimates:
        type: array
        items:
          $ref: './EstimateResponse.yaml'
      votedCount:
        type: integer
      questionVotesCount:
        type: integer
      totalParticipants:
        type: integer
