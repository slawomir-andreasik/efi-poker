name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'
      - uses: gradle/actions/setup-gradle@v5
        with:
          cache-encryption-key: ${{ secrets.GRADLE_CACHE_ENCRYPTION_KEY }}
          cache-cleanup: always

      - name: Read version
        id: version
        run: echo "version=$(grep -oP '(?<=version=).+' version.properties)" >> "$GITHUB_OUTPUT"

      # Always: tests + format + coverage
      - run: ./gradlew :backend:check
      - uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: test-results
          path: '**/build/reports/'

      # Docker build + push on main and dev
      - uses: docker/login-action@v4
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev'
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Restore buildpack cache
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev'
        uses: actions/cache@v5
        with:
          path: |
            /tmp/bbi-cache
            /tmp/bbi-cache-launch
          key: bbi-${{ runner.os }}-${{ hashFiles('backend/build.gradle.kts', 'gradle/libs.versions.toml') }}
          restore-keys: bbi-${{ runner.os }}-
      - name: Prepare buildpack cache dirs
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev'
        run: mkdir -p /tmp/bbi-cache /tmp/bbi-cache-launch
      - name: Build and push backend image
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev'
        env:
          GHCR_USERNAME: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BOOT_IMAGE_TAGS: >-
            ghcr.io/${{ github.repository }}/backend:${{ github.ref == 'refs/heads/main' && 'latest' || 'latest-dev' }},ghcr.io/${{ github.repository }}/backend:${{ github.sha }}
          BBI_CACHE_DIR: /tmp/bbi-cache
        run: ./gradlew :backend:bootBuildImage --publishImage

  frontend:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - name: Cache bun dependencies
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('frontend/bun.lock') }}
          restore-keys: bun-${{ runner.os }}-

      - name: Read version
        id: version
        run: echo "version=$(grep -oP '(?<=version=).+' version.properties)" >> "$GITHUB_OUTPUT"

      # Lint and build (no codegen needed - frontend uses hand-maintained types.ts)
      - name: Install, lint and build
        run: cd frontend && bun install && bun run lint && VITE_APP_VERSION=${{ steps.version.outputs.version }} bun run build

      # Docker build on main and dev
      - uses: docker/login-action@v4
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev'
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Generate image tags
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev'
        id: meta-client
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}/frontend
          tags: |
            type=raw,value=${{ github.ref == 'refs/heads/main' && 'latest' || 'latest-dev' }}
            type=raw,value=${{ steps.version.outputs.version }}
            type=sha,format=long,prefix=
      - uses: docker/setup-buildx-action@v4
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev'
      - uses: docker/build-push-action@v7
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev'
        with:
          context: frontend
          file: frontend/Dockerfile
          push: true
          tags: ${{ steps.meta-client.outputs.tags }}
          build-args: APP_VERSION=${{ steps.version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  scan-backend:
    needs: [backend]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v6
        with:
          sparse-checkout: .trivyignore
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Cache Trivy DB
        uses: actions/cache@v5
        with:
          path: /tmp/trivy-cache
          key: trivy-db-${{ runner.os }}-${{ github.run_id }}
          restore-keys: trivy-db-${{ runner.os }}-
      - name: Scan backend image
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: ghcr.io/${{ github.repository }}/backend:${{ github.sha }}
          exit-code: '1'
          severity: CRITICAL,HIGH
          trivyignores: .trivyignore
          cache-dir: /tmp/trivy-cache

  scan-frontend:
    needs: [frontend]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v6
        with:
          sparse-checkout: .trivyignore
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Cache Trivy DB
        uses: actions/cache@v5
        with:
          path: /tmp/trivy-cache
          key: trivy-db-${{ runner.os }}-${{ github.run_id }}
          restore-keys: trivy-db-${{ runner.os }}-
      - name: Scan frontend image
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: ghcr.io/${{ github.repository }}/frontend:${{ github.sha }}
          exit-code: '1'
          severity: CRITICAL,HIGH
          trivyignores: .trivyignore
          cache-dir: /tmp/trivy-cache
