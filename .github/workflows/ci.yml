name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: efipoker_test
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-home-cache-cleanup: true

      - name: Read version
        id: version
        run: echo "version=$(grep -oP '(?<=version=).+' version.properties)" >> "$GITHUB_OUTPUT"

      # Always: tests + format + coverage
      - run: ./gradlew :backend:check
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: test-results
          path: '**/build/reports/'

      # Docker build on main and dev pushes
      - uses: docker/login-action@v3
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev'
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Generate image tags
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev'
        id: meta-server
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/backend
          tags: |
            type=raw,value=${{ github.ref == 'refs/heads/main' && 'latest' || 'latest-dev' }}
            type=raw,value=${{ steps.version.outputs.version }}
            type=sha,format=long,prefix=
      - name: Build server image
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev'
        env:
          GHCR_USERNAME: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./gradlew :backend:bootBuildImage
      - name: Push server image
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev'
        run: |
          SOURCE="ghcr.io/${{ github.repository }}/backend:${{ steps.version.outputs.version }}"
          while IFS= read -r TAG; do
            [ -z "$TAG" ] && continue
            docker tag "$SOURCE" "$TAG"
            docker push "$TAG"
          done <<< "$TAGS"
        env:
          TAGS: ${{ steps.meta-server.outputs.tags }}

  frontend:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-home-cache-cleanup: true
      - uses: oven-sh/setup-bun@v2
      - name: Cache bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('frontend/bun.lock') }}
          restore-keys: bun-${{ runner.os }}-

      - name: Read version
        id: version
        run: echo "version=$(grep -oP '(?<=version=).+' version.properties)" >> "$GITHUB_OUTPUT"

      # Always: codegen + lint + build
      - name: Generate TypeScript API client
        run: ./gradlew :api:generateTypescriptClient
      - name: Install, lint and build
        run: cd frontend && bun install && bun run lint && VITE_APP_VERSION=${{ steps.version.outputs.version }} bun run build

      # Docker build on main and dev pushes
      - uses: docker/login-action@v3
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev'
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Generate image tags
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev'
        id: meta-client
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/frontend
          tags: |
            type=raw,value=${{ github.ref == 'refs/heads/main' && 'latest' || 'latest-dev' }}
            type=raw,value=${{ steps.version.outputs.version }}
            type=sha,format=long,prefix=
      - uses: docker/setup-buildx-action@v3
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev'
      - uses: docker/build-push-action@v6
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev'
        with:
          context: frontend
          file: frontend/Dockerfile
          push: true
          tags: ${{ steps.meta-client.outputs.tags }}
          build-args: APP_VERSION=${{ steps.version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  scan:
    needs: [backend, frontend]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev'
    runs-on: ubuntu-latest
    permissions:
      packages: read
    steps:
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Cache Trivy DB
        uses: actions/cache@v4
        with:
          path: /tmp/trivy-cache
          key: trivy-db-${{ github.run_id }}
          restore-keys: trivy-db-
      - name: Scan server image
        uses: aquasecurity/trivy-action@0.34.2
        with:
          image-ref: ghcr.io/${{ github.repository }}/backend:${{ github.sha }}
          exit-code: '0'
          severity: CRITICAL,HIGH
          cache-dir: /tmp/trivy-cache
      - name: Scan client image
        uses: aquasecurity/trivy-action@0.34.2
        with:
          image-ref: ghcr.io/${{ github.repository }}/frontend:${{ github.sha }}
          exit-code: '0'
          severity: CRITICAL,HIGH
          cache-dir: /tmp/trivy-cache
