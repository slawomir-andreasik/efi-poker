name: Release

on:
  push:
    branches: [main]

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read version
        id: version
        run: echo "version=$(grep -oP '(?<=version=).+' version.properties)" >> "$GITHUB_OUTPUT"

      - name: Skip SNAPSHOT versions
        if: contains(steps.version.outputs.version, 'SNAPSHOT')
        run: |
          echo "Skipping release for SNAPSHOT version: ${{ steps.version.outputs.version }}"
          echo "skip=true" >> "$GITHUB_OUTPUT"
        id: check

      - name: Create tag and release
        if: steps.check.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          TAG="v${VERSION}"

          # Skip if tag already exists
          if git rev-parse "$TAG" &>/dev/null; then
            echo "Tag $TAG already exists, skipping."
            exit 0
          fi

          git tag "$TAG"
          git push origin "$TAG"

          # Skip if release already exists
          if gh release view "$TAG" &>/dev/null; then
            echo "Release $TAG already exists, skipping."
            exit 0
          fi

          PREV_TAG=$(git tag --sort=-version:refname | grep '^v' | sed -n '2p')
          NOTES_FLAG=""
          if [ -n "$PREV_TAG" ]; then
            NOTES_FLAG="--notes-start-tag $PREV_TAG"
          fi
          gh release create "$TAG" \
            --title "EFI Poker $TAG" \
            --generate-notes $NOTES_FLAG
