name: Release

on:
  push:
    tags: ['v*']

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate tag matches version.properties
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          FILE_VERSION="$(grep -oP '(?<=version=).+' version.properties)"
          if [ "$TAG_VERSION" != "$FILE_VERSION" ]; then
            echo "::error::Tag $TAG_VERSION != version.properties $FILE_VERSION"
            exit 1
          fi

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Skip if release already exists (created manually before tag push)
          if gh release view "$GITHUB_REF_NAME" &>/dev/null; then
            echo "Release $GITHUB_REF_NAME already exists, skipping."
            exit 0
          fi
          PREV_TAG=$(git tag --sort=-version:refname | grep '^v' | sed -n '2p')
          NOTES_FLAG=""
          if [ -n "$PREV_TAG" ]; then
            NOTES_FLAG="--notes-start-tag $PREV_TAG"
          fi
          gh release create "$GITHUB_REF_NAME" \
            --title "EFI Poker $GITHUB_REF_NAME" \
            --generate-notes $NOTES_FLAG
