name: Release

on:
  push:
    branches: [main]

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read version
        id: version
        run: echo "version=$(grep -oP '(?<=version=).+' version.properties)" >> "$GITHUB_OUTPUT"

      - name: Skip SNAPSHOT versions
        id: check
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          if [[ "$VERSION" == *-SNAPSHOT* ]]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Skipping release for SNAPSHOT version: $VERSION"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create tag and GitHub Release
        if: steps.check.outputs.skip == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          VERSION="${{ steps.version.outputs.version }}"
          TAG="v${VERSION}"

          # Skip if tag already exists
          if git tag -l "$TAG" | grep -q .; then
            echo "Tag $TAG already exists, skipping."
            exit 0
          fi

          # Skip if release already exists
          if gh release view "$TAG" &>/dev/null; then
            echo "Release $TAG already exists, skipping."
            exit 0
          fi

          git tag -a "$TAG" -m "Release $TAG"
          git push origin "$TAG"

          PREV_TAG=$(git tag --sort=-version:refname | grep '^v' | sed -n '2p')
          NOTES_FLAG=""
          if [ -n "$PREV_TAG" ]; then
            NOTES_FLAG="--notes-start-tag $PREV_TAG"
          fi
          gh release create "$TAG" \
            --title "EFI Poker $TAG" \
            --generate-notes $NOTES_FLAG
