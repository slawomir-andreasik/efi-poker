services:
  client:
    build: ./frontend
    ports:
      - "${DEV_PORT:-5173}:8080"
    volumes:
      - ./frontend/nginx-dev.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - frontend
    depends_on:
      app:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 128M

  app:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      CORS_ORIGINS: http://localhost:${DEV_PORT:-5173}
    expose:
      - "8080"
    networks:
      - frontend
      - backend
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:8080/actuator/health"]
      interval: 10s
      timeout: 5s
      start_period: 30s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: efipoker
      POSTGRES_USER: efipoker
      POSTGRES_PASSWORD: changeme
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata-dev:/var/lib/postgresql/data
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U efipoker"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M

  ldap:
    image: osixia/openldap:1.5.0
    command: --copy-service
    profiles:
      - ldap
    environment:
      LDAP_ORGANISATION: "Example Inc"
      LDAP_DOMAIN: example.com
      LDAP_ADMIN_PASSWORD: adminpassword
    ports:
      - "389:389"
    volumes:
      - ./scripts/ldap-seed.ldif:/container/service/slapd/assets/config/bootstrap/ldif/custom/seed.ldif:ro
    networks:
      - backend
    healthcheck:
      test: ["CMD", "ldapsearch", "-x", "-H", "ldap://127.0.0.1:389", "-b", "dc=example,dc=com", "-D", "cn=admin,dc=example,dc=com", "-w", "adminpassword", "(objectClass=organization)"]
      interval: 10s
      timeout: 5s
      start_period: 15s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M

networks:
  frontend: # client <-> app
  backend:  # app <-> postgres (isolated)

volumes:
  pgdata-dev:
